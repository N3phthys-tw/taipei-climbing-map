<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北市攀岩館互動地圖 | Taipei Climbing Gym Map</title>
    <link rel="icon" href="data:,">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>台北市攀岩館互動地圖</h1>
        <p>探索台北市最受歡迎的抱石與上攀場館</p>
    </header>

    <div id="app-container">
        <aside id="sidebar">
            <!-- Navigation Summary Badge -->
            <div id="nav-summary" class="nav-summary hidden">
                <div class="nav-content">
                    <div class="nav-info">
                        <span id="nav-time">-- 分鐘</span>
                        <span id="nav-dist">-- km</span>
                    </div>
                    <button id="nav-close" title="關閉導航與高亮"><i class="fas fa-times"></i></button>
                </div>
            </div>
            
            <div class="sidebar-header">
                <h2>尋找場館</h2>
                <div class="filters">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="搜尋行政區或場館...">
                    </div>
                    <div class="type-checkboxes">
                        <label><input type="checkbox" class="type-filter" value="抱石" checked> 抱石</label>
                        <label><input type="checkbox" class="type-filter" value="上攀" checked> 上攀</label>
                    </div>
                </div>
            </div>
            <div id="gym-list">
                <!-- Gym list items will be injected here -->
            </div>
        </aside>

        <main id="map-container">
            <!-- Leaflet Map will be injected here -->
            <div id="map"></div>
            
            <!-- Map Style Switcher -->
            <div class="map-style-ctrl">
                <button id="style-btn" class="style-btn" title="切換地圖風格"><i class="fas fa-layer-group"></i></button>
                <div id="style-menu" class="style-menu hidden">
                    <div class="style-option" data-style="standard"><i class="fas fa-map"></i> 標準色彩</div>
                    <div class="style-option" data-style="dark"><i class="fas fa-moon"></i> 極簡暗黑</div>
                    <div class="style-option" data-style="satellite"><i class="fas fa-satellite"></i> 地形衛星</div>
                </div>
            </div>

            <button id="geo-btn" class="geo-btn" title="我的位置"><i class="fas fa-location-arrow"></i></button>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <!-- Application Logic -->
    <script src="script.js?v=4"></script>
</body>
</html>
